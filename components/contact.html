<section id="contato" class="py-24 relative bg-[#0d1b2a]">
    <div class="max-w-4xl mx-auto px-6">
        <div class="glass-card p-8 md:p-16 rounded-[2rem] relative overflow-hidden reveal-hidden border border-white/10">
            <div class="absolute top-0 right-0 w-80 h-80 bg-blue-500/10 rounded-full blur-[80px] pointer-events-none"></div>

            <div class="relative z-10 text-center mb-12">
                <h2 class="font-heading text-3xl md:text-5xl font-bold text-white tracking-tight mb-6">Vamos criar algo incrível?</h2>
                <p class="text-slate-400 text-lg max-w-lg mx-auto">Estou disponível para freelance e oportunidades de trabalho. Se você busca alguém dedicada e ansiosa para aprender, entre em contato.</p>
            </div>

            <form class="space-y-6 max-w-lg mx-auto relative z-10">
                <div class="space-y-2 text-left">
                    <label class="text-xs text-slate-400 font-bold uppercase tracking-wider ml-1">Nome</label>
                    <input type="text" placeholder="Seu nome completo" class="w-full bg-[#0a0f1e] border border-white/10 rounded-xl px-5 py-4 text-white placeholder-slate-600 focus:outline-none focus:ring-2 focus:ring-blue-500/50 focus:border-blue-500 transition-all">
                </div>
                <div class="space-y-2 text-left">
                    <label class="text-xs text-slate-400 font-bold uppercase tracking-wider ml-1">E-mail</label>
                    <input type="email" placeholder="seu@email.com" class="w-full bg-[#0a0f1e] border border-white/10 rounded-xl px-5 py-4 text-white placeholder-slate-600 focus:outline-none focus:ring-2 focus:ring-blue-500/50 focus:border-blue-500 transition-all">
                </div>
                <div class="space-y-2 text-left">
                    <label class="text-xs text-slate-400 font-bold uppercase tracking-wider ml-1">Mensagem</label>
                    <textarea rows="4" placeholder="Conte-me sobre seu projeto..." class="w-full bg-[#0a0f1e] border border-white/10 rounded-xl px-5 py-4 text-white placeholder-slate-600 focus:outline-none focus:ring-2 focus:ring-blue-500/50 focus:border-blue-500 transition-all resize-none"></textarea>
                </div>
                <button type="button" class="w-full py-4 bg-blue-600 hover:bg-blue-500 text-white font-bold rounded-xl shadow-[0_0_20px_rgba(59,130,246,0.3)] transition-all transform hover:-translate-y-1 mt-4">
                    Enviar Mensagem
                </button>
            </form>

            <div class="mt-16 flex justify-center gap-8 border-t border-white/5 pt-8">
                <a href="https://github.com/noemisoares" target="_blank" class="flex flex-col items-center gap-2 group">
                    <div class="w-12 h-12 rounded-full bg-white/5 flex items-center justify-center text-slate-400 group-hover:bg-white/10 group-hover:text-white transition-all">
                        <iconify-icon icon="simple-icons:github" width="24"></iconify-icon>
                    </div>
                    <span class="text-xs text-slate-500 group-hover:text-white transition-colors">GitHub</span>
                </a>
                <a href="https://www.linkedin.com/in/noemi-soares-5a3327352" target="_blank" class="flex flex-col items-center gap-2 group">
                    <div class="w-12 h-12 rounded-full bg-white/5 flex items-center justify-center text-slate-400 group-hover:bg-blue-600 group-hover:text-white transition-all">
                        <iconify-icon icon="simple-icons:linkedin" width="24"></iconify-icon>
                    </div>
                    <span class="text-xs text-slate-500 group-hover:text-white transition-colors">LinkedIn</span>
                </a>
                <a href="#" onclick="event.preventDefault()" class="flex flex-col items-center gap-2 group cursor-default">
                    <div class="w-12 h-12 rounded-full bg-white/5 flex items-center justify-center text-slate-400 group-hover:bg-cyan-600 group-hover:text-white transition-all">
                        <iconify-icon icon="solar:letter-bold" width="24"></iconify-icon>
                    </div>
                    <span class="text-xs text-slate-500 group-hover:text-white transition-colors">E-mail</span>
                </a>
            </div>
        </div>
    </div>
</section>
